<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iframe demo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 1rem;
            max-width: 900px;
        }
        h1 { font-size: 1.25rem; margin-top: 0; }
        iframe {
            display: block;
            width: 100%;
            height: 70vh;
            min-height: 320px;
            border: 1px solid #ccc;
            border-radius: 6px;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>
    <h1>Iframe demo</h1>
    <p>
        Click inside the frame first if the trackpad/wheel doesn’t scroll (focus must be in the iframe).
        The inner site controls its own scrolling; <code>overflow: hidden</code> there can’t be overridden from here.
    </p>
    <iframe
        src="https://staging-bit.kafene.com/oCJDjFD"
        title="Embedded example"
        tabindex="0"
        scrolling="yes"
    ></iframe>
</body>
</html>
